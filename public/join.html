<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RemoteView — Просмотр</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body { background: #000; overflow: hidden; }

    header {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(8px);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 0.6rem 1.25rem;
      gap: 0.75rem;
    }

    header h1 { font-size: 1rem; margin-right: auto; }

    .header-status {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .viewer-area {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Отступ сверху под хедер */
    .viewer-area { padding-top: 52px; }

    #remote-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      color: var(--muted);
      text-align: center;
      padding: 2rem;
    }

    .overlay-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      margin: 0;
    }

    .overlay-sub {
      font-size: 0.9rem;
      color: var(--muted);
      max-width: 320px;
      line-height: 1.6;
    }

    #btn-fullscreen {
      display: none;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🖥</div>
  <h1>RemoteView</h1>

  <div class="header-status">
    <div class="dot dot-connecting" id="status-dot"></div>
    <span id="status-text">Подключение...</span>
  </div>

  <button class="btn btn-ghost" id="btn-fullscreen" onclick="toggleFullscreen()">⛶ Полный экран</button>
</header>

<div class="viewer-area" id="viewer-area">
  <div class="overlay" id="overlay">
    <div class="spinner" id="spinner"></div>
    <p class="overlay-title" id="overlay-title">Подключение к сессии...</p>
    <p class="overlay-sub" id="overlay-sub">Пожалуйста, подождите</p>
  </div>
  <video id="remote-video" autoplay playsinline></video>
</div>

<script>
  const ICE_CONFIG = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      {
        urls: ['turn:openrelay.metered.ca:80', 'turn:openrelay.metered.ca:443', 'turn:openrelay.metered.ca:443?transport=tcp'],
        username: 'openrelayproject',
        credential: 'openrelayproject'
      }
    ]
  };

  // Достаём roomId из пути /join/:roomId и token из query
  const pathParts = window.location.pathname.split('/').filter(Boolean);
  const roomId = pathParts[pathParts.length - 1];
  const token = new URLSearchParams(window.location.search).get('token');

  const video = document.getElementById('remote-video');
  const overlay = document.getElementById('overlay');
  const spinner = document.getElementById('spinner');

  function setStatus(dotClass, text) {
    document.getElementById('status-dot').className = 'dot ' + dotClass;
    document.getElementById('status-text').textContent = text;
  }

  function showOverlay(title, sub, showSpinner = true) {
    video.style.display = 'none';
    overlay.style.display = 'flex';
    document.getElementById('overlay-title').textContent = title;
    document.getElementById('overlay-sub').textContent = sub;
    spinner.style.display = showSpinner ? 'block' : 'none';
    document.getElementById('btn-fullscreen').style.display = 'none';
  }

  function showVideo() {
    overlay.style.display = 'none';
    video.style.display = 'block';
    document.getElementById('btn-fullscreen').style.display = 'inline-flex';
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.getElementById('viewer-area').requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }

  // Проверка параметров
  if (!roomId || !token) {
    setStatus('dot-error', 'Ошибка');
    showOverlay('Неверная ссылка', 'Ссылка недействительна или была повреждена. Попросите хоста выслать новую ссылку.', false);
  } else {
    let pc;

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${proto}//${location.host}/ws?roomId=${roomId}&token=${token}&role=viewer`);

    ws.onopen = () => {
      setStatus('dot-waiting', 'Ожидание хоста...');
      showOverlay('Ожидание хоста', 'Хост должен открыть сессию и начать трансляцию экрана.');
    };

    ws.onerror = () => {
      setStatus('dot-error', 'Ошибка подключения');
      showOverlay('Ошибка соединения', 'Не удалось подключиться к серверу. Проверьте ссылку и попробуйте снова.', false);
    };

    ws.onclose = (e) => {
      pc?.close();
      setStatus('dot-error', 'Отключено');

      if (e.code === 4001) {
        showOverlay('Доступ запрещён', 'Ссылка недействительна или истекла. Попросите хоста создать новую сессию.', false);
      } else if (e.code === 4002) {
        showOverlay('Сессия завершена', 'Хост завершил трансляцию экрана.', false);
      } else {
        showOverlay('Соединение прервано', 'Связь с хостом была прервана. Попробуйте обновить страницу.', false);
      }
    };

    ws.onmessage = async ({ data }) => {
      const msg = JSON.parse(data);

      if (msg.type === 'offer') {
        setStatus('dot-connecting', 'Установка соединения...');
        showOverlay('Установка соединения...', 'Настраиваем защищённый P2P канал.');

        pc = new RTCPeerConnection(ICE_CONFIG);

        pc.onicecandidate = ({ candidate }) => {
          if (candidate && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'candidate', candidate }));
          }
        };

        pc.ontrack = ({ track, streams }) => {
          // Ждём пока трек реально начнёт передавать данные
          track.onunmute = () => {
            if (video.srcObject !== streams[0]) {
              video.srcObject = streams[0];
            }
            video.play().catch(() => {});
            showVideo();
            setStatus('dot-connected', 'Подключён');
          };
        };

        pc.onconnectionstatechange = () => {
          if (['disconnected', 'failed'].includes(pc.connectionState)) {
            setStatus('dot-error', 'Соединение прервано');
            showOverlay('Соединение прервано', 'Связь с хостом была потеряна.', false);
          }
        };

        await pc.setRemoteDescription(msg.sdp);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        ws.send(JSON.stringify({ type: 'answer', sdp: pc.localDescription }));

      } else if (msg.type === 'candidate') {
        await pc?.addIceCandidate(msg.candidate);
      }
    };
  }
</script>
</body>
</html>
